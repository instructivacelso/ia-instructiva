<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Instructiva · Central</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23ffb020'/></svg>" />
</head>
<body>
  <div class="signalbar"></div>

  <!-- Login -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <div class="brandmark">Escola Instructiva</div>
      <h1>Central de IA</h1>
      <p>Orquestrador de agentes de WhatsApp.</p>
      <label>Senha de acesso</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
      <div style="margin-top:16px">
        <button class="btn primary" id="btnLogin" style="width:100%; justify-content:center">Entrar</button>
      </div>
      <div id="gateErr" style="color:var(--danger); font-size:12.5px; margin-top:12px; min-height:16px"></div>
    </div>
  </div>

  <!-- App -->
  <div class="app" id="app">
    <aside class="side">
      <div class="logo">
        <div class="dot"></div>
        <div>
          <b>IA Instructiva</b>
          <span>central de agentes</span>
        </div>
      </div>
      <button class="navbtn active" data-view="agentes"><span class="ico">◆</span> Agentes</button>
      <button class="navbtn" data-view="conversas"><span class="ico">▤</span> Conversas</button>
      <button class="navbtn" data-view="config"><span class="ico">⚙</span> Configurações</button>
      <div class="foot">
        <div class="status" id="sysStatus">verificando…</div>
        <button class="navbtn" id="btnSair"><span class="ico">⏻</span> Sair</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="viewTitle">Agentes</h2>
          <div class="sub" id="viewSub">Cada agente controla um número de WhatsApp.</div>
        </div>
        <div id="topActions"></div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- Overlays -->
  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
