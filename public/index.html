<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Instructiva · Central</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
  <link rel="apple-touch-icon" href="logo.jpeg" />
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <div class="gate-logo"><img src="logo.jpeg" alt="Instructiva" /></div>
      <div class="brandmark">Escola Instructiva</div>
      <h1>Central de IA</h1>
      <p>Entre com seu usuário pra gerenciar seus agentes.</p>
      <label>Usuário</label>
      <input type="text" id="login" placeholder="seu login" autocomplete="username" />
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
      <div style="margin-top:20px">
        <button class="btn primary" id="btnLogin" style="width:100%; justify-content:center">Entrar</button>
      </div>
      <div id="gateErr" style="color:var(--danger); font-size:12.5px; margin-top:12px; min-height:16px"></div>
    </div>
  </div>

  <div class="app" id="app">
    <aside class="side">
      <div class="logo">
        <div class="logobadge"><img src="logo.jpeg" alt="Instructiva" /></div>
        <div><b>IA Instructiva</b><span>Central</span></div>
      </div>
      <nav id="nav"></nav>
      <div class="foot">
        <div class="userchip">
          <div class="avatar" id="uAvatar">?</div>
          <div class="who"><b id="uNome">—</b><span id="uRole">—</span></div>
        </div>
        <div class="divider"></div>
        <button class="navbtn" id="btnTema"><span class="ico" id="temaIco">☾</span> <span id="temaTxt">Modo escuro</span></button>
        <button class="navbtn" id="btnSair"><span class="ico">⏻</span> Sair</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
      <div class="hirow">
        <div class="hi" id="greeting">Olá</div>
        <div id="globalIa"></div>
      </div>
        <div class="titlerow">
          <h2 id="viewTitle">Agentes</h2>
          <div id="topActions"></div>
        </div>
        <div class="sub" id="viewSub"></div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
  <div class="editor" id="editor"></div>
  <div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt="" /></div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script src="editor.js"></script>
</body>
</html>
